name: Preflight generated ref permissions

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: preflight-generated-ref
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Check out source with preflight credentials
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install locked dependencies
        run: |
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install --no-deps --no-build-isolation -e .

      - name: Validate static contracts
        run: ds-tvbox validate-static --repository .

      - name: Configure preflight identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify create and lease-delete permissions
        run: ds-tvbox preflight-ref --repository .
